<table class="table table-striped">
    <thead>
        <tr>
            <th><f:translate key="number" /></th>
            <th><f:translate key="type" /></th>
            <th><f:translate key="start" /></th>
            <th><f:translate key="end" /></th>
            <th><f:translate key="address" /></th>
            <th><f:translate key="availability" /></th>
            <th><f:translate key="actions" /></th>
        </tr>
    </thead>
    <tbody>
        <f:for each="{courses}" as="course">
            <tr>
                <td>{course.number}</td>
                <td>{course.courseType}</td>
                <td><f:format.date format="d.m.Y H:i">{course.courseStartDate}</f:format.date></td>
                <td><f:format.date format="d.m.Y H:i">{course.courseEndDate}</f:format.date></td>
                <td>
                    <f:if condition="{course.address}">
                        <f:if condition="{settings.detailPid}">
                            <f:then>
                                <f:link.action action="show" pluginName="AddressDetail" controller="Address" arguments="{address: course.address}" pageUid="{settings.detailPid}">
                                    {course.address.fullName}
                                </f:link.action>
                            </f:then>
                            <f:else>
                                {course.address.fullName}
                            </f:else>
                        </f:if>
                    </f:if>
                </td>
                <td>
                    <f:if condition="{course.available}">
                        <f:then><f:translate key="available" /></f:then>
                        <f:else><f:translate key="booked_out" /></f:else>
                    </f:if>
                </td>
                <td>
                    <f:if condition="{course.linkForRegistration}">
                        <f:link.external uri="{course.linkForRegistration}" class="btn btn-primary" target="_blank">
                            <f:translate key="register" />
                        </f:link.external>
                    </f:if>
                </td>
            </tr>
        </f:for>
    </tbody>
</table>
